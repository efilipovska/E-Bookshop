apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ebookshop-ingress
  namespace: ebookshop

spec:
  ingressClassName: traefik

  rules:
    - host: ebookshop.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend-service

                port:
                  number: 80